services:
  db:
    image: postgres:17-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12

  web:
    image: seller-site:local
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; request=urllib.request.Request('http://127.0.0.1:8000/health/', headers={'Host':'localhost','X-Forwarded-Proto':'https'}); urllib.request.urlopen(request, timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8

  worker:
    image: seller-site:local
    build: .
    restart: unless-stopped
    command: ["worker"]
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "manage.py", "worker_health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s

  proxy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    profiles: ["tls"]
    environment:
      STORE_DOMAIN: ${STORE_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
