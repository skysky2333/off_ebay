{% extends "base.html" %}
{% block title %}Session expired | {{ store_name }}{% endblock %}
{% block body_class %}error-view{% endblock %}
{% block content %}
  <section class="error-page">
    <div class="error-page__inner">
      <p class="error-page__code">403</p>
      <h1>Your secure session expired.</h1>
      <p>Return to the shop and try again.</p>
      <a class="button" href="{% url 'storefront:catalog' %}">Return to shop</a>
    </div>
  </section>
{% endblock %}
